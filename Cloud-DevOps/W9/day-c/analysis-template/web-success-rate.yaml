apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: web-success-rate
  namespace: w9
spec:
  metrics:
  - name: success-rate
    interval: 1m
    count: 3
    successCondition: result[0] >= 0.99
    failureLimit: 1
    provider:
      prometheus:
        address: http://prometheus-server.w9-observability.svc.cluster.local
        query: |
          1 - (
            sum(rate(http_requests_total{app="web",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{app="web"}[5m]))
          )
